# ─────────────────────────────────────────────────────────────────────
# Forking this repo? Replace `name`, `database_name`, and `database_id`
# below with your own values before `wrangler deploy`. The IDs in this
# file point to the maintainer's hosted demo deployment — they are not
# secret, but they are not yours, and `wrangler deploy` will fail with
# a permissions error unless you swap them for IDs from your own
# Cloudflare account. See README → "Self-host" for the full walkthrough.
# ─────────────────────────────────────────────────────────────────────

name = "game-outreach-mcp"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "game-outreach-mcp-db"
database_id = "a352e09a-579f-42f2-a053-ca2dc4ed372d"

[vars]
# No secrets here — all third-party keys come from request headers per-request

# Optional: preview environment
[[env.preview.d1_databases]]
binding = "DB"
database_name = "game-outreach-mcp-db-preview"
database_id = "REPLACE_WITH_YOUR_PREVIEW_D1_ID"

[observability]
enabled = true
